body:
  text: 西天譯經三藏朝奉大夫試鴻臚卿傳法大師臣施護奉詔譯如是我聞一時佛在舍衛國祇樹給孤獨園與苾芻衆俱是時佛告諸苾芻言汝等當知彼三十三天中有一大樹名為園生其樹盤根及五由旬高百由旬所有枝葉覆五十由旬彼天子衆依時往彼樹下遊觀其樹即生半努鉢羅舍時諸天子見是事已即生歡喜適悅快樂其後非久復生尸囉拏鉢羅舍諸天子衆依時往彼遊觀轉增適悅快樂又復非久即生寶網以覆其上而為莊嚴彼天子衆依時往彼樹下遊觀轉復增於適悅快樂又復非久生叉囉迦彼天子衆依時往彼樹下遊觀見是事已轉復增於適悅快樂又復非久生俱砧摩羅迦彼天子衆依時往彼樹下遊觀轉復增於適悅快樂又復非久生迦迦寫彼天子衆依時遊觀轉增適悅又復非久彼園生樹滿樹開華其華清淨異香殊妙微風吹動其香馥郁五十由旬大風所吹滿百由旬復有殊妙光明照於八十由旬其樹既開華已彼天子衆見樹開華轉倍於前生大快樂於夏四月居其樹下適悅娛樂佛告諸苾芻汝等當知彼園生樹有如是事妙華異香人所愛樂諸聲聞人亦復如是彼樹初生半努鉢羅舍時即如聲聞人初發信心出家向道復次彼樹生尸囉拏鉢羅舍時即如聲聞人剃除鬚髮被袈裟衣成聲聞相復次彼樹生寶網時即如聲聞人厭離諸欲捨不善法遠離種種思惟分別獲得初禪離生喜樂定復次彼樹生叉曪迦時即如聲聞人外相善寂內心靜住離諸思惟定心一想獲得二禪定生喜樂定復次彼樹生俱砧摩羅迦時即如聲聞人離諸喜愛身得輕安適悅妙樂獲得第三禪離喜妙樂定復次彼樹生迦迦寫時即如聲聞人斷除一切憂苦喜樂住平等心獲得第四禪捨念清淨定復次彼樹開敷妙華異香遍聞人所愛樂時即如聲聞人諸漏已盡非漏隨增證無學果不受後有人天瞻敬受大供養同彼華開其事如是佛告諸苾芻汝等當知彼三十三天諸天子衆各各色相殊異嚴好種種莊飾居善法堂集會圍繞聽受帝釋天主宣說妙法汝諸苾芻各獲果證清淨圓滿梵行具足一切見敬圍繞世尊聽受妙法同彼天衆亦復如是爾時諸苾芻聞佛宣說園生樹已各各心生歡喜踊躍信受奉行
